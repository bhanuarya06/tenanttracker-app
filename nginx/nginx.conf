events {
  worker_connections 1024;
}

http {
  upstream api {
    server backend:5001;
  }

  # HTTP server: redirect all to HTTPS
  server {
    listen 80;
    server_name tenanttracker.online www.tenanttracker.online;
    return 301 https://$host$request_uri;
  }

  # HTTPS server
  server {
    listen 443 ssl;
    server_name tenanttracker.online www.tenanttracker.online;

    ssl_certificate /etc/nginx/ssl/tenanttracker.online.crt; # <-- Replace with your cert path
    ssl_certificate_key /etc/nginx/ssl/tenanttracker.online.key; # <-- Replace with your key path
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10M;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy
    location /api/ {
      proxy_pass http://api/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # Auth routes (no /api prefix)
    location /auth/ {
      proxy_pass http://api/auth/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth routes
    location /oauth/ {
      proxy_pass http://api/oauth/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads (static files served by backend)
    location /uploads/ {
      proxy_pass http://api/uploads/;
      proxy_set_header Host $host;
    }

    # Health check
    location /health {
      proxy_pass http://api/health;
    }

    # OIDC discovery
    location /.well-known/ {
      proxy_pass http://api/.well-known/;
    }

    location /assets/ {
      try_files $uri =404;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # Frontend SPA
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
