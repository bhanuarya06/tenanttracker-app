events {
  worker_connections 1024;
}

http {
  # Required — without this, JS/CSS are served as application/octet-stream
  # and the browser refuses to execute them.
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;

  gzip      on;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml image/svg+xml;

  upstream api {
    server backend:5001;
  }

  # Redirect all plain-HTTP traffic to HTTPS
  server {
    listen 80;
    server_name tenanttracker.online www.tenanttracker.online;
    return 301 https://$host$request_uri;
  }

  # HTTPS — serves the React SPA and proxies all backend calls
  server {
    listen 443 ssl;
    server_name tenanttracker.online www.tenanttracker.online;

    ssl_certificate     /etc/nginx/ssl/tenanttracker.online.crt;
    ssl_certificate_key /etc/nginx/ssl/tenanttracker.online.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10M;
    root  /usr/share/nginx/html;
    index index.html;

    # ── Backend proxy ────────────────────────────────────────────────────────
    # proxy_pass WITHOUT a trailing path (e.g. "http://api" not "http://api/")
    # keeps the full request URI intact.  The backend mounts routes at
    # /api/*, /auth/*, /oauth/*, /uploads/*, /health, /.well-known/*, so the
    # path must reach the backend unchanged.

    location /api/ {
      proxy_pass         http://api/;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    location /auth/ {
      proxy_pass         http://api/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /oauth/ {
      proxy_pass         http://api/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
      proxy_pass       http://api;
      proxy_set_header Host $host;
    }

    location /health {
      proxy_pass http://api;
    }

    location /.well-known/ {
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
    }

    # ── Static frontend ──────────────────────────────────────────────────────

    # Vite outputs hashed filenames — safe to cache forever
    location /assets/ {
      try_files  $uri =404;
      expires    1y;
      add_header Cache-Control "public, immutable";
    }

    # SPA catch-all: unknown paths serve index.html so React Router handles routing
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
