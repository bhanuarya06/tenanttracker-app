events {
  worker_connections 1024;
}

http {
  upstream api {
    server backend:5001;
  }

  upstream frontend {
    server frontend:5173;
  }

  server {
        # SPA client-side routing fallback for /auth/callback/*
        location ~ ^/auth/callback/ {
          proxy_pass http://frontend;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection 'upgrade';
          proxy_set_header Host $host;
          proxy_cache_bypass $http_upgrade;
        }
    listen 80;
    server_name localhost;

    client_max_body_size 10M;

    # API proxy
    location /api/ {
      proxy_pass http://api/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # Auth routes (no /api prefix)
    location /auth/ {
      proxy_pass http://api/auth/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth routes
    location /oauth/ {
      proxy_pass http://api/oauth/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads (static files served by backend)
    location /uploads/ {
      proxy_pass http://api/uploads/;
      proxy_set_header Host $host;
    }

    # Health check
    location /health {
      proxy_pass http://api/health;
    }

    # OIDC discovery
    location /.well-known/ {
      proxy_pass http://api/.well-known/;
    }

    # Frontend (Vite dev or static files)
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
