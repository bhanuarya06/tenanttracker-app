version: '3.8'


services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/bhanuarya06/tenanttracker-app/api:latest}
    container_name: tenanttracker-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV:           production
      CORS_ORIGIN:        https://tenanttracker.online
      FRONTEND_URL:       https://tenanttracker.online
      OIDC_ISSUER:        https://tenanttracker.online
      OIDC_REDIRECT_URIS: "https://tenanttracker.online/auth/callback/google,https://tenanttracker.online/auth/callback/github"

    volumes:
      - ./backend/src:/app/src
      - backend-uploads:/app/uploads
      - /app/node_modules
    networks:
      - tt-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: tenanttracker-web
    restart: unless-stopped
    ports:
      - '5173:5173'
    environment:
      VITE_API_BASE_URL: /api
      VITE_PROXY_TARGET: http://backend:5001
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - tt-network

  nginx:
    image: ${WEB_IMAGE:-ghcr.io/bhanuarya06/tenanttracker-app/web:latest}
    container_name: tenanttracker-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/tenanttracker.online/fullchain.pem:/etc/nginx/ssl/tenanttracker.online.crt:ro
      - /etc/letsencrypt/live/tenanttracker.online/privkey.pem:/etc/nginx/ssl/tenanttracker.online.key:ro
    depends_on:
      - backend
    networks:
      - tt-network

volumes:
  backend-uploads:

networks:
  tt-network:
    driver: bridge
