name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY:       ghcr.io
  BACKEND_IMAGE:  ghcr.io/${{ github.repository }}/api
  WEB_IMAGE:      ghcr.io/${{ github.repository }}/web

jobs:
  build-and-push:
    name: Build, Scan & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend ─────────────────────────────────────────────────────────────

      - name: Build backend image
        run: |
          docker build \
            -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.BACKEND_IMAGE }}:latest \
            ./backend

      - name: Scan backend image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref:      ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format:         table
          exit-code:      "0"
          ignore-unfixed: true
          severity:       HIGH,CRITICAL

      - name: Push backend image
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      # ── Web (React SPA bundled with Nginx) ──────────────────────────────────

      - name: Build web image
        run: |
          docker build \
            -f nginx/Dockerfile \
            -t ${{ env.WEB_IMAGE }}:${{ github.sha }} \
            -t ${{ env.WEB_IMAGE }}:latest \
            .

      - name: Scan web image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref:      ${{ env.WEB_IMAGE }}:${{ github.sha }}
          format:         table
          exit-code:      "0"
          ignore-unfixed: true
          severity:       HIGH,CRITICAL

      - name: Push web image
        run: |
          docker push ${{ env.WEB_IMAGE }}:${{ github.sha }}
          docker push ${{ env.WEB_IMAGE }}:latest

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            # Verify Docker Compose v2 is installed
            if ! docker compose version >/dev/null 2>&1; then
              echo "ERROR: Docker Compose v2 plugin is required. Install it and retry."
              exit 1
            fi
            echo "Docker Compose: $(docker compose version)"

            # Pull the latest code onto the server
            cd ~/tenanttracker-app
            git fetch origin main
            git reset --hard origin/main

            # Authenticate with GHCR so docker compose can pull private images
            echo "${{ secrets.GHCR_PAT }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pin containers to the exact image SHA built above
            export BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            export WEB_IMAGE=${{ env.WEB_IMAGE }}:${{ github.sha }}

            echo "Pulling new images..."
            docker compose pull

            echo "Starting containers..."
            docker compose up -d --remove-orphans

            echo "Pruning old images..."
            docker image prune -f

            echo "Running health check (waiting 15s for containers to stabilise)..."
            sleep 15
            if ! curl -fsS https://tenanttracker.online/health; then
              echo "Health check failed — rolling back"
              docker compose down
              exit 1
            fi

            echo "Deployment complete!"
