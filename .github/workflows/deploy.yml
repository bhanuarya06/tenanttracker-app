name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/api
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web

jobs:
  build-and-push:
    name: Build, Scan & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build backend image
      - name: Build backend image
        run: docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} -t ${{ env.BACKEND_IMAGE }}:latest ./backend

      # Scan backend image for vulnerabilities
      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@v0.16.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true

      # Push backend image
      - name: Push backend image
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      # Build edge web image (serves static frontend + proxies API)
      - name: Build web image
        run: docker build -f nginx/Dockerfile -t ${{ env.WEB_IMAGE }}:${{ github.sha }} -t ${{ env.WEB_IMAGE }}:latest .

      # Scan web image for vulnerabilities
      - name: Scan web image (Trivy)
        uses: aquasecurity/trivy-action@v0.16.0
        with:
          image-ref: ${{ env.WEB_IMAGE }}:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true

      # Push web image
      - name: Push web image
        run: |
          docker push ${{ env.WEB_IMAGE }}:${{ github.sha }}
          docker push ${{ env.WEB_IMAGE }}:latest

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4
      # Manual approval step (optional, uncomment if needed)
      # - name: Wait for approval
      #   uses: trstringer/manual-approval@v1
      #   with:
      #     secret: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd tenanttracker-app
            git fetch origin main
            git checkout main
            git pull origin main
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export BACKEND_IMAGE=ghcr.io/${{ github.repository }}/api:${{ github.sha }}
            export WEB_IMAGE=ghcr.io/${{ github.repository }}/web:${{ github.sha }}
            echo "Pulling latest images..."
            docker-compose pull
            echo "Deploying containers (zero downtime)..."
            docker-compose up -d --remove-orphans
            echo "Pruning old images..."
            docker image prune -f
            echo "Waiting for health checks..."
            sleep 10
            if ! curl -fsSL https://tenanttracker.online/health; then
              echo "Health check failed! Rolling back..."
              docker-compose down
              exit 1
            fi
            echo "Deployment successful!"
