name: Deploy

on:
  push:
    branches: [prod]
  workflow_dispatch:

env:
  REGISTRY:       ghcr.io
  BACKEND_IMAGE:  ghcr.io/${{ github.repository }}/api
  WEB_IMAGE:      ghcr.io/${{ github.repository }}/web

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        run: |
          docker build \
            -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.BACKEND_IMAGE }}:latest \
            ./backend

      - name: Push backend image
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Build web image
        run: |
          docker build \
            -f frontend/Dockerfile \
            -t ${{ env.WEB_IMAGE }}:${{ github.sha }} \
            -t ${{ env.WEB_IMAGE }}:latest \
            ./frontend
      - name: Push web image
        run: |
          docker push ${{ env.WEB_IMAGE }}:${{ github.sha }}
          docker push ${{ env.WEB_IMAGE }}:latest

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_PAT,GITHUB_ACTOR,BACKEND_IMAGE,WEB_IMAGE
          script: |
            cd /home/ubuntu/tenanttracker-app

            git pull

            echo "$GHCR_PAT" | \
              docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Pin containers to the exact image SHA built above
            export BACKEND_IMAGE="${BACKEND_IMAGE}:${{ github.sha }}"
            export WEB_IMAGE="${WEB_IMAGE}:${{ github.sha }}"

            docker-compose pull
            docker-compose up -d --remove-orphans

            echo "Running health check (waiting 15s for containers to stabilise)..."
            sleep 15
            if ! curl -fsS https://tenanttracker.online/health; then
              echo "Health check failed — rolling back"
              docker-compose down
              exit 1
            fi

            docker image prune -f
            echo "Deployment complete!"
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          WEB_IMAGE: ${{ env.WEB_IMAGE }}
